services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: encar
      POSTGRES_USER: encar
      POSTGRES_PASSWORD: ${DB_PASSWORD:-encar}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Postgres НЕ пробрасывается наружу. Контейнеры общаются с ним по
    # внутренней docker-сети через hostname `postgres:5432`. Если когда-то
    # понадобится psql снаружи — открывай временно через `docker compose
    # exec postgres psql ...` либо SSH-туннель.
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U encar -d encar"]
      interval: 5s
      timeout: 5s
      retries: 5

  parser:
    build:
      context: .
      target: cron
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://encar:${DB_PASSWORD:-encar}@postgres:5432/encar
    volumes:
      - ./models.yaml:/app/models.yaml:ro
      - encar_logs:/var/log
    # Bounded memory: parser used to OOM-kill (exit 137) on the full
    # 100-model rotation because Playwright Chromium fallback + growing
    # httpx pool accumulated past the host's per-container cap. 1 GiB
    # comfortably covers the API path (~150 MiB observed) and one or two
    # BrowserFetcher fallbacks at a time (~250 MiB each).
    mem_limit: 1g
    mem_reservation: 512m
    # Retry after OOM-kill — but don't tight-loop if entrypoint crashes
    # every restart. Cap at 5 attempts within any 5-minute window.
    restart: on-failure:5

  # Web viewer — постоянно работающий FastAPI на порту 8090. Переживает
  # выход из SSH и перезагрузку благодаря restart: unless-stopped.
  # Не делает работы сам: только читает из postgres и проксирует фото.
  # Порт 8090 проброшен ТОЛЬКО на 127.0.0.1 — снаружи витрина недоступна,
  # смотрим через `ssh -L 8090:127.0.0.1:8090 user@host`.
  web:
    build:
      context: .
      target: web
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://encar:${DB_PASSWORD:-encar}@postgres:5432/encar
      WEB_PORT: "8090"
      WEB_WORKERS: "2"
    ports:
      - "127.0.0.1:8090:8090"
    restart: unless-stopped

volumes:
  pgdata:
  encar_logs:
