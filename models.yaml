# --- Подсказка ---------------------------------------------------------------
# Парсер строит запрос к API encar (api.encar.com/search/car/list/general)
# из полей manufacturer / model_group / model.
# Если модель возвращает 0 машин — открой encar.com в браузере, примени фильтр,
# в DevTools → Network скопируй параметр `q` из запроса к /search/car/list/...
# и вставь его сюда как raw_q. Тогда он используется как есть:
#
#   - slug: example-raw
#     name: "Пример с raw_q"
#     raw_q: "(And.(C.CarType.Y._.(C.Manufacturer.BMW._.(C.ModelGroup.X5._.Model.X5 (G05).))))"
#     car_type_code: "Y"   # код CarType внутри q (Y/N) — подбери если q генерится сам
