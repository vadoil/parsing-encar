    # Реальный q из браузера (carType=N, не Y; ModelGroup без C.; Year.range).
    # raw_q перебивает сгенерированный фильтр — используется как есть.
    raw_q: "(And.Hidden.N._.(C.CarType.N._.(C.Manufacturer.BMW._.ModelGroup.X5.))_.Year.range(201800..202699).)"
    car_type_code: "N"

